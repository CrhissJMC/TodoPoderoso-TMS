name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (PHP + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, pgsql, bcmath, curl, dom, fileinfo, filter, hash, openssl, session, tokenizer, zip
          tools: composer:v2
          coverage: none

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Instalar dependencias PHP
        run: composer install --prefer-dist --no-interaction

      - name: Preparar entorno (.env apuntando al Postgres del workflow)
        run: |
          cp .env.example .env
          sed -i -E \
            -e "s/^#?\s*DB_CONNECTION=.*/DB_CONNECTION=pgsql/" \
            -e "s/^#?\s*DB_HOST=.*/DB_HOST=127.0.0.1/" \
            -e "s/^#?\s*DB_PORT=.*/DB_PORT=5432/" \
            -e "s/^#?\s*DB_DATABASE=.*/DB_DATABASE=testing/" \
            -e "s/^#?\s*DB_USERNAME=.*/DB_USERNAME=postgres/" \
            -e "s/^#?\s*DB_PASSWORD=.*/DB_PASSWORD=postgres/" \
            .env

      - name: Generar APP_KEY
        run: php artisan key:generate

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Verificar estilo de código (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Configurar Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Instalar dependencias NPM
        run: npm ci

      - name: Build de Vite (necesario para pruebas de Inertia)
        run: npm run build

      - name: Ejecutar test suite
        run: php artisan test

  frontend:
    name: Frontend (Node + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Instalar dependencias NPM
        run: npm ci

      - name: Typecheck de TypeScript
        run: npx tsc --noEmit

      - name: Build de producción (Vite)
        run: npm run build
