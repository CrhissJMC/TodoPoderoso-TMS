# ============================================================
# CD - Despliegue Continuo: Documentación (Camino B)
# Se activa al hacer Merge a la rama 'main', en paralelo con cd-app.yml.
#
# ⚠️  PENDIENTE DE CONFIGURACIÓN POR EL SPONSOR
# El paso de publicación (publish-docs) requiere habilitar
# GitHub Pages en: Settings → Pages → Source: GitHub Actions
# ============================================================
name: CD - Publicar Documentación

on:
  push:
    branches:
      - main

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue de docs a la vez
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------
  # PASO 5.2: BUILD - Construir documentación HTML
  # Convierte los archivos Markdown del repositorio en un
  # sitio HTML estático con navegación entre páginas.
  # ----------------------------------------------------------
  build-docs:
    name: 📄 Build Documentación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar Pandoc (conversor Markdown → HTML)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc

      - name: Generar sitio HTML desde Markdown
        run: |
          mkdir -p docs-site

          # Copiar documentos del repositorio
          for doc in README.md RBAC_DOCUMENTATION.md RBAC_IMPLEMENTATION.md AUDIT_REPORT.md AGENTS.md; do
            [ -f "$doc" ] && cp "$doc" docs-site/
          done

          cd docs-site

          # Plantilla HTML con tema oscuro estilo GitHub
          cat > template.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>$title$ — TodoPoderoso TMS</title>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
                   background:#0d1117;color:#c9d1d9;line-height:1.7}
              .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
              header{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 0;margin-bottom:2rem}
              header .inner{max-width:900px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1rem}
              header a{color:#58a6ff;text-decoration:none;font-weight:600}
              nav{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem 1.5rem;margin-bottom:2rem}
              nav ul{list-style:none;display:flex;flex-wrap:wrap;gap:.5rem 1.5rem}
              nav a{color:#58a6ff;text-decoration:none;font-size:.9rem}
              h1{color:#e6edf3;font-size:2rem;margin-bottom:1rem;border-bottom:1px solid #30363d;padding-bottom:.5rem}
              h2{color:#e6edf3;font-size:1.4rem;margin:2rem 0 .75rem}
              h3{color:#e6edf3;font-size:1.1rem;margin:1.5rem 0 .5rem}
              p{margin-bottom:1rem}
              a{color:#58a6ff}
              code{background:#161b22;border:1px solid #30363d;border-radius:4px;padding:.15em .4em;
                   font-family:'Courier New',monospace;font-size:.88em;color:#f78166}
              pre{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.2rem;
                  overflow-x:auto;margin:1rem 0}
              pre code{background:none;border:none;padding:0;color:#c9d1d9}
              ul,ol{margin:.5rem 0 1rem 1.5rem}
              li{margin-bottom:.3rem}
              table{border-collapse:collapse;width:100%;margin:1rem 0}
              th,td{border:1px solid #30363d;padding:.5rem .75rem;text-align:left}
              th{background:#161b22;color:#e6edf3}
              blockquote{border-left:4px solid #30363d;padding-left:1rem;color:#8b949e;margin:1rem 0}
              footer{margin-top:3rem;padding-top:1rem;border-top:1px solid #30363d;
                     color:#8b949e;font-size:.85rem;text-align:center}
              .badge{display:inline-block;background:#1f6feb;color:#fff;border-radius:12px;
                     padding:.15em .6em;font-size:.8rem}
            </style>
          </head>
          <body>
            <header>
              <div class="inner">
                <span class="badge">TMS</span>
                <a href="index.html">TodoPoderoso TMS — Documentación</a>
              </div>
            </header>
            <div class="container">
              <nav>
                <ul>
                  <li><a href="index.html">📋 Inicio</a></li>
                  <li><a href="RBAC_DOCUMENTATION.html">🔐 RBAC</a></li>
                  <li><a href="RBAC_IMPLEMENTATION.html">⚙️ Implementación</a></li>
                  <li><a href="AUDIT_REPORT.html">📊 Auditoría</a></li>
                  <li><a href="AGENTS.html">🤖 Agentes</a></li>
                </ul>
              </nav>
              $body$
              <footer>
                <p>TodoPoderoso TMS · Generado automáticamente · Commit: ${{ github.sha }}</p>
              </footer>
            </div>
          </body>
          </html>
          HTMLEOF

          for md in *.md; do
            [ -f "$md" ] || continue
            html="${md%.md}.html"
            pandoc "$md" --template=template.html --metadata title="${md%.md}" --from markdown --to html5 -o "$html"
            echo "✅ $html"
          done

          # README como página principal
          [ -f "README.html" ] && mv README.html index.html

      - name: Subir artifact de documentación para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

  # ----------------------------------------------------------
  # PASO 6.2: PUBLISH - Publicar en GitHub Pages
  #
  # 🔒 DESHABILITADO — Pendiente de activación por el sponsor.
  # Para activar:
  #   1. Ir a Settings → Pages → Source → GitHub Actions
  #   2. Descomentar el bloque completo de este job
  # ----------------------------------------------------------

  publish-docs:
    name: 🌐 Publicar en GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Confirmar URL de documentación
        run: echo "✅ Documentación publicada en ${{ steps.deployment.outputs.page_url }}"
