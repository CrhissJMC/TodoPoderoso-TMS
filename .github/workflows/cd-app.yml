# ============================================================
# CD - Despliegue Continuo: Aplicación TMS (Camino A)
# Se activa al hacer Merge a la rama 'main'.
#
# ⚠️  PENDIENTE DE CONFIGURACIÓN POR EL SPONSOR
# Este workflow está preparado estructuralmente pero requiere
# que el sponsor defina el servidor y dominio de producción
# antes de activar el paso de despliegue (deploy-app).
#
# Secrets a configurar en GitHub → Settings → Secrets:
#   - DEPLOY_HOST     → IP o dominio del servidor
#   - DEPLOY_USER     → Usuario SSH del servidor
#   - DEPLOY_SSH_KEY  → Clave privada SSH
#   - DEPLOY_PATH     → Ruta raíz en el servidor (ej: /var/www/tms)
#   - APP_KEY         → Laravel APP_KEY de producción
#   - DB_HOST         → Host de la base de datos PostgreSQL
#   - DB_DATABASE     → Nombre de la base de datos
#   - DB_USERNAME     → Usuario de la base de datos
#   - DB_PASSWORD     → Contraseña de la base de datos
# ============================================================
name: CD - Deploy Aplicación TMS

on:
  push:
    branches:
      - main

jobs:
  # ----------------------------------------------------------
  # PASO 5.1: BUILD - Construir la aplicación completa
  # Instala dependencias PHP de producción y compila el frontend.
  # ----------------------------------------------------------
  build-app:
    name: 🏗️ Build Aplicación TMS
    runs-on: ubuntu-latest

    outputs:
      build-version: ${{ steps.version.outputs.sha }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Obtener versión del commit
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: pdo, pdo_pgsql, pgsql, mbstring, xml, bcmath
          coverage: none

      - name: Caché de dependencias Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Instalar dependencias PHP (modo producción)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-scripts

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias NPM
        run: npm ci

      - name: "⚡ Compilar assets con Vite"
        run: npm run build

      - name: Empaquetar artifact de despliegue
        run: |
          tar -czf tms-build-${{ steps.version.outputs.sha }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='*.tar.gz' \
            .

      - name: Subir artifact de despliegue
        uses: actions/upload-artifact@v4
        with:
          name: tms-build-${{ steps.version.outputs.sha }}
          path: tms-build-${{ steps.version.outputs.sha }}.tar.gz
          retention-days: 7

  # ----------------------------------------------------------
  # PASO 6.1: DEPLOY - Desplegar en servidor de producción
  #
  # 🔒 DESHABILITADO — Pendiente de configuración del sponsor.
  # Para activar: descomentar el bloque completo de este job
  # y configurar los Secrets listados en el encabezado del archivo.
